# MIL 基线热图生成配置
---
exp_arguments:
  n_classes: 2
  save_exp_code: dlbcl_mil_heatmap
  raw_save_dir: heatmaps/heatmap_raw_results
  production_save_dir: heatmaps/heatmap_production_results
  batch_size: 256
data_arguments:
  data_dir: raw_slides/
  process_list: process_list_dlbcl.csv
  preset: presets/bwh_biopsy.csv
  slide_ext: .sdpc
  label_dict:
    GCB: 0
    non-GCB: 1
patching_arguments:
  patch_size: 256
  overlap: 0
  patch_level: 0
  custom_downsample: 1
encoder_arguments:
  model_name: resnet50_trunc
  target_img_size: 224
model_arguments:
  ckpt_path: results/dlbcl_gcb_nongcb_mil_s1/s_0_checkpoint.pt
  model_type: mil
  initiate_fn: initiate_model
  model_size: small
  drop_out: 0.
  embed_dim: 1024
heatmap_arguments:
  vis_level: -1
  alpha: 0.4
  blank_canvas: false
  save_orig: true
  save_ext: jpg
  use_ref_scores: true
  blur: false
  use_center_shift: true
  use_roi: false
  calc_heatmap: true
  binarize: false
  binary_thresh: -1
  custom_downsample: 1
  cmap: jet
sample_arguments:
  samples:
    - name: "topk_high_attention"
      sample: true
      seed: 1
      k: 15
      mode: topk
